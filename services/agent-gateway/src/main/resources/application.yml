spring:
  application:
    name: agent-gateway
  profiles:
    default: mock

server:
  port: 18080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

gateway:
  self-base-url: http://localhost:${server.port}
  secure-cookies: false
  jwt-secret: changeit-changeit-changeit
  default-user-id: z01062668
  default-username: demo.user

clients:
  policy-center:
    base-url: http://localhost:18081
  agent-management:
    base-url: http://localhost:${server.port}/mock/agent-management

providers:
  idaas:
    authorize-url: http://localhost:${server.port}/mock/idaas/authorize
    token-url: http://localhost:${server.port}/mock/idaas/oauth2/token
    userinfo-url: http://localhost:${server.port}/mock/idaas/oauth2/userinfo
    client-id: agent_gateway_client
    client-secret: mock-client-secret
  iam:
    base-url: http://localhost:${server.port}/mock/iam
    agent-token-path: /iam/auth/agent-token
    assume-agent-token-path: /iam/projects/{gatewayProject}/assume-agent-token
    resource-token-path: /iam/auth/resource-token
    gateway-account: mock-gateway-ai-account
    gateway-secret: mock-gateway-ai-secret
    gateway-project: proxy_project_001
    gateway-enterprise: ent_001
    gateway-token-refresh-skew-seconds: 300

mock-agent-management:
  entries:
    - agent-id: agt_business_001
      agent-name: business-data-assistant
      enterprise: ent_001
      app-id: com.huawei.business.agent
      allowed-return-hosts:
        - localhost
        - 127.0.0.1
      subscribed-permission-point-codes:
        - erp:contract:r
        - erp:invoice:r
        - erp:report:r
    - agent-id: agt_contract_only_001
      agent-name: contract-only-assistant
      enterprise: ent_001
      app-id: com.huawei.contract.agent
      allowed-return-hosts:
        - localhost
        - 127.0.0.1
      subscribed-permission-point-codes:
        - erp:contract:r
